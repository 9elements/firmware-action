---
# Test built docker images by building simple projects inside them

name: dagger
on:
  pull_request:
    paths:
      - '.dagger-ci'
      - '.github/workflows/docker-build-and-test.yml'
      - 'docker/**'
      - 'tests/**'
  push:
    branches: ['main']
    paths:
      - '.dagger-ci'
      - '.github/workflows/docker-build-and-test.yml'
      - 'docker/**'
      - 'tests/**'
  release:
  schedule:
    # First day of the month at midnight
    - cron: '0 0 1 * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  #=============================
  # Dynamically generate matrix
  #=============================

  get-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: get-matrix
        id: get-matrix
        run: |
          echo matrix=$( yq '.services | keys[]' docker/compose.yaml | sed 's/"//g' | jq -Rs 'split("\n") | del(.[-1])' | jq -c ) >> "${GITHUB_OUTPUT}"
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}

  get-matrix-coreboot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: get-matrix
        id: get-matrix
        run: |
          echo matrix=$( yq '.services | keys[] | select(. | test("coreboot.*"))' docker/compose.yaml | sed 's/"//g' | jq -Rs 'split("\n") | del(.[-1])' | jq -c ) >> "${GITHUB_OUTPUT}"
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}

  get-matrix-edk2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: get-matrix
        id: get-matrix
        run: |
          echo matrix=$( yq '.services | keys[] | select(. | test("(e|u)dk2.*"))' docker/compose.yaml | sed 's/"//g' | jq -Rs 'split("\n") | del(.[-1])' | jq -c ) >> "${GITHUB_OUTPUT}"
    outputs:
      matrix: ${{ steps.get-matrix.outputs.matrix }}


  #=====================
  # Coreboot toolchains
  #=====================

  build-coreboot-toolchains:
    timeout-minutes: 80
    needs:
      - get-matrix-coreboot
    strategy:
      fail-fast: false
      matrix:
        arch: ['amd64', 'arm64']
        dockerfile: ${{ fromJson(needs.get-matrix-coreboot.outputs.matrix) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ARM64' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Find out coreboot version
        id: version
        run: yq -r '.services.["${{ matrix.dockerfile }}"].build.args[] | select(test("COREBOOT_VERSION=.*"))' docker/compose.yaml >> "${GITHUB_OUTPUT}"

      - name: Clone coreboot
        run: git clone --depth 1 "https://review.coreboot.org/coreboot.git" -b "${{ steps.version.outputs.COREBOOT_VERSION }}"

      # toolchains and utils are cached so that we do not have to re-compile all the time
      - name: Restore cached toolchains
        id: cache-toolchains
        uses: actions/cache/restore@v4
        with:
          path: coreboot/util/crossgcc/xgcc/bin
          key: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-${{ matrix.arch }}-xgcc
      - name: Restore cached utils
        id: cache-utils
        uses: actions/cache/restore@v4
        with:
          path: /usr/local/bin
          key: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-${{ matrix.arch }}-utils

      - name: Install dependencies
        if: steps.cache-toolchains.outputs.cache-hit != 'true' && matrix.arch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y bison build-essential curl flex git gnat libncurses-dev libssl-dev zlib1g-dev pkgconf

      - name: Build coreboot toolchains and utilities
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          cd coreboot
          make crossgcc CPUS="$(nproc)"
          make -C util/ifdtool install
          make -C util/cbfstool install

      # Store toolchains and utils in cache
      - name: Cache toolchains
        uses: actions/cache/save@v4
        with:
          path: coreboot/util/crossgcc/xgcc/bin
          key: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-${{ matrix.arch }}-xgcc
      - name: Cache utils
        uses: actions/cache/save@v4
        with:
          path: /usr/local/bin
          key: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-${{ matrix.arch }}-utils

      # Upload toolchains and utils as artifacts
      - name: Upload toolchain
        uses: actions/upload-artifact@v4
        with:
          name: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-${{ matrix.arch }}-xgcc
          path: coreboot/util/crossgcc/xgcc/bin
          retention-days: 30
          include-hidden-files: true
      - name: Upload utils
        uses: actions/upload-artifact@v4
        with:
          name: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-${{ matrix.arch }}-utils
          path: /usr/local/bin
          retention-days: 30
          include-hidden-files: true


  #=====================
  # Coreboot toolchains
  #=====================

  # build-edk2-toolchains:
  # TODO


  #===================
  # Docker containers
  #===================

  build:
    name: build_test_publish
    runs-on: ubuntu-latest
    container:
      image: ubuntu:jammy
    timeout-minutes: 60
    needs:
      - get-matrix
      - build-coreboot-toolchains
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.get-matrix.outputs.matrix) }}
    steps:
      # We have to use my own fork of actions/delete-package-versions at the moment
      #   to have access to 'dry-run' and 'ignore-versions-include-tags' features
      # We can switch to upstream whe following PRs get merged:
      #   - [dry-run](https://github.com/actions/delete-package-versions/pull/119/commits)
      #   - [tags](https://github.com/actions/delete-package-versions/pull/104
      - name: Delete old packages
        uses: AtomicFS/delete-package-versions@main
        continue-on-error:
          true
          # we have continue-on-error because when I make a fork of this repo to debug something,
          # the Docker containers would not build because this step fails to fetch existing containers
          # (in fresh fork there are none)
        with:
          package-name: firmware-action/${{ matrix.dockerfile }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions:
            '^(main|latest|v(\d+\.?)+)$'
            # ignore:
            # - main
            # - latest
            # - vX
            # - vX.X
            # - vX.X.X
          dry-run: false
          ignore-versions-include-tags: true

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Find out coreboot version
        id: version
        run: yq -r '.services.["${{ matrix.dockerfile }}"].build.args[] | select(test(".*_VERSION=.*"))' docker/compose.yaml >> "${GITHUB_OUTPUT}"


      #=================================
      # Download artifacts for coreboot
      #=================================

      - name: Download toolchains for amd64
        uses: actions/download-artifact@v4
        if: startsWith(matrix.dockerfile, 'coreboot')
        with:
          name: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-amd64-xgcc
          path: docker/coreboot/coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}/xgcc-amd64

      - name: Download toolchains for arm64
        uses: actions/download-artifact@v4
        if: startsWith(matrix.dockerfile, 'coreboot')
        with:
          name: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-arm64-xgcc
          path: docker/coreboot/coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}/xgcc-arm64

      - name: Download utils for amd64
        uses: actions/download-artifact@v4
        if: startsWith(matrix.dockerfile, 'coreboot')
        with:
          name: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-amd64-utils
          path: docker/coreboot/coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}/utils-amd64

      - name: Download utils for arm64
        uses: actions/download-artifact@v4
        if: startsWith(matrix.dockerfile, 'coreboot')
        with:
          name: coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}-arm64-utils
          path: docker/coreboot/coreboot-${{ steps.version.outputs.COREBOOT_VERSION }}/utisl-arm64


      #=============================
      # Download artifacts for edk2
      #=============================

        # TODO


      #============================
      # Build the docker container
      #============================

      - name: Setup docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate compose file
        run: docker-compose -f docker/compose.yaml config

      - name: Install python dependencies
        run: pip install -r ./.dagger-ci/daggerci/requirements.txt

      - name: Run dagger pipeline
        timeout-minutes: 30
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == 'release' ]] || [[ "${GITHUB_REF}" == *'main' ]] || [[ "${GITHUB_REF_TYPE}" == 'tag' ]]; then
            echo "Enable publishing"
            python .dagger-ci/daggerci/main.py -d ${{ matrix.dockerfile }} --publish
          else
            echo "Disable publishing"
            python .dagger-ci/daggerci/main.py -d ${{ matrix.dockerfile }}
          fi
        shell: bash
        env:
          GITHUB_REGISTRY: ${{ env.REGISTRY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
